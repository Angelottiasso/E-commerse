<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TresMosqueteros_Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>

    <div class="wrapper">
        <header class="header-mobile">
            <h1 class="logo">TresMosqueteros_Store</h1>
            <button class="open-menu" id="open-menu">
                <i class="bi bi-list"></i>
            </button>
        </header>
        <aside>
            <button class="close-menu" id="close-menu">
                <i class="bi bi-x"></i>
            </button>
            <header>
                <h1 class="logo">TresMosqueteros_Store</h1>
            </header>
            <nav>
                <ul class="menu">
                    <li>
                        <button id="todos" class="boton-menu boton-categoria active"><i class="bi bi-hand-index-thumb-fill"></i> Todos los productos</button>
                    </li>
                    <li>
                        <button id="abrigos" class="boton-menu boton-categoria"><i class="bi bi-hand-index-thumb"></i> Abrigos</button>
                    </li>
                    <li>
                        <button id="camisetas" class="boton-menu boton-categoria"><i class="bi bi-hand-index-thumb"></i> Camisetas</button>
                    </li>
                    <li>
                        <button id="pantalones" class="boton-menu boton-categoria"><i class="bi bi-hand-index-thumb"></i> Pantalones</button>
                    </li>
                    <li>
                        <a class="boton-menu boton-carrito" href="./carrito.html">
                            <i class="bi bi-cart-fill"></i> Carrito <span id="numerito" class="numerito">0</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <footer>
                <p class="texto-footer">@2026 TresMosqueteros_Store</p>z
            </footer>
        </aside>
        <main>
            <h2 class="titulo-principal" id="titulo-principal">Todos los productos</h2>
            <div id="contenedor-productos" class="contenedor-productos">
                <!-- Esto se va a rellenar con JS -->
            </div>
        </main>
    </div>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/menu.js"></script>

        <div class="container mt-5">
            <div class="row" id="contenedor-productos"></div>
        </div>

    <script>
        // Coloca aquí la URL exacta que te generó Render y añádele /api/productos
        const urlAPI = 'https://e-commerse-b1jt.onrender.com';

        fetch(urlAPI)
            .then(respuesta => respuesta.json())
            .then(datos => {
                const contenedor = document.getElementById('contenedor-productos');
                
                datos.forEach(producto => {
                    // Dibujamos las tarjetas implementando las clases de Bootstrap
                    contenedor.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100 shadow-sm">
                                <img src="${producto.imagen}" class="card-img-top" alt="${producto.titulo}">
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title">${producto.titulo}</h5>
                                    <p class="card-text text-muted mb-1">${producto.categoria.nombre}</p>
                                    <p class="card-text fw-bold mb-3">Precio: $${producto.precio}</p>
                                    <button class="btn btn-dark mt-auto">Añadir al Carrito</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(error => console.error('Error al cargar la base de datos:', error));
    </script>
</body>
